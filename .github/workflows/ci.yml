name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv venv .venv
      - run: . .venv/bin/activate && uv pip install ".[providers]" pytest pytest-asyncio httpx
      - run: . .venv/bin/activate && RUN_OFFLINE=true DATABASE_URL="sqlite+aiosqlite:///:memory:" GITHUB_WEBHOOK_SECRET=ci pytest -q
