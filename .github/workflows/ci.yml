name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Base install: only core deps, NO provider SDKs. Proves the suite is
          # green when openai/anthropic are absent (get_llm degrades to StubLLM,
          # provider tests skip via importorskip).
          - name: base
            extras: ""
          # Full install: includes openai + anthropic. Exercises the real
          # provider clients selected by LLM_PROVIDER.
          - name: providers
            extras: "[providers]"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv venv .venv
      - name: Install dependencies
        run: . .venv/bin/activate && uv pip install ".${{ matrix.extras }}" pytest pytest-asyncio httpx
      - name: Run tests (${{ matrix.name }})
        run: . .venv/bin/activate && RUN_OFFLINE=true DATABASE_URL="sqlite+aiosqlite:///:memory:" GITHUB_WEBHOOK_SECRET=ci pytest -q
